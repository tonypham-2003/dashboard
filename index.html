<!DOCTYPE html>
<!-- dashboard-v4-dark -->
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T&amp;C Dashboard — DP World</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

<style>
/* ── RESET & BASE ────────────────────────── */
:root{
  --sw:260px;
  --bg:#0d1117;
  --surface:#161b22;
  --surface2:#21262d;
  --border:rgba(255,255,255,.08);
  --shadow:0 8px 32px rgba(0,0,0,.45);
  --r:1rem;
  --font:'Plus Jakarta Sans',-apple-system,sans-serif;
  --dark:#e6edf3;
  --muted:#7d8590;
  --accent:#1A73E8;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--dark);display:flex;min-height:100vh}

/* ── SIDEBAR ─────────────────────────────── */
.sidebar{
  width:var(--sw);min-height:100vh;position:fixed;top:0;left:0;z-index:200;
  background:linear-gradient(195deg,#1c2130,#0d1117);
  display:flex;flex-direction:column;padding:1.5rem 1rem;
  border-right:1px solid var(--border);
}
.sb-logo{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem 1.5rem;border-bottom:1px solid var(--border);margin-bottom:1.5rem}
.sb-icon{width:2.25rem;height:2.25rem;border-radius:.6rem;background:linear-gradient(195deg,#49a3f1,#1A73E8);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 14px rgba(26,115,232,.4)}
.sb-icon svg{width:1.2rem;height:1.2rem;stroke:white;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.sb-brand{color:var(--dark);font-size:.9rem;font-weight:700;line-height:1.2}
.sb-brand small{display:block;font-size:.7rem;font-weight:400;color:var(--muted)}
.nav-sec{color:rgba(255,255,255,.3);font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.5rem 1rem .3rem}
.nav-link{display:flex;align-items:center;gap:.75rem;padding:.6rem 1rem;border-radius:.6rem;color:var(--muted);font-size:.82rem;font-weight:500;cursor:pointer;transition:all .2s;margin-bottom:.15rem;user-select:none}
.nav-link:hover{background:rgba(255,255,255,.06);color:var(--dark)}
.nav-link.active{background:rgba(26,115,232,.15);color:#58a6ff;border:1px solid rgba(26,115,232,.3)}
.nav-link svg{width:1rem;height:1rem;flex-shrink:0;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.nav-link.active svg{stroke:#58a6ff}
.sb-foot{margin-top:auto;padding-top:1rem;border-top:1px solid var(--border)}
.sb-status{display:flex;align-items:center;gap:.5rem;padding:.5rem 1rem;font-size:.72rem;color:var(--muted)}
.dot{width:.5rem;height:.5rem;border-radius:50%;flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}

/* ── MAIN ────────────────────────────────── */
.main{margin-left:var(--sw);flex:1;min-height:100vh;display:flex;flex-direction:column}

/* ── TOPBAR ──────────────────────────────── */
.topbar{
  background:rgba(13,17,23,.92);backdrop-filter:blur(12px);
  padding:.8rem 1.5rem;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;
}
.breadcrumb{font-size:.8rem;color:var(--muted)}
.breadcrumb b{color:var(--dark)}
.topbar-r{display:flex;align-items:center;gap:.75rem}
.last-upd{font-size:.74rem;color:var(--muted)}
.live-badge{display:flex;align-items:center;gap:.35rem;background:rgba(16,185,129,.12);color:#10b981;padding:.25rem .7rem;border-radius:2rem;font-size:.7rem;font-weight:800;letter-spacing:.06em;border:1px solid rgba(16,185,129,.2)}
.live-dot{width:.45rem;height:.45rem;border-radius:50%;background:#10b981;animation:pulse 1.5s infinite}
.btn-refresh{
  display:flex;align-items:center;gap:.4rem;
  background:rgba(26,115,232,.15);color:#58a6ff;
  border:1px solid rgba(26,115,232,.3);border-radius:.5rem;
  padding:.4rem .85rem;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s;
}
.btn-refresh:hover{background:rgba(26,115,232,.25);border-color:rgba(88,166,255,.5)}
.btn-refresh:disabled{opacity:.5;cursor:default}
.btn-refresh svg{width:.9rem;height:.9rem;stroke:#58a6ff;fill:none;stroke-width:2.5;stroke-linecap:round}
.btn-refresh.spin svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── FILTER BAR (time period) ────────────── */
.filter-bar{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:.6rem 1.5rem;
  display:flex;align-items:center;gap:.45rem;flex-wrap:wrap;
}
.fbar-label{font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-right:.3rem;white-space:nowrap}
.fbar-btn{
  padding:.28rem .8rem;border-radius:2rem;
  border:1px solid var(--border);background:transparent;
  color:var(--muted);font-size:.74rem;font-weight:500;font-family:var(--font);
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.fbar-btn:hover{border-color:rgba(88,166,255,.4);color:var(--dark)}
.fbar-btn.active{background:var(--accent);border-color:var(--accent);color:white;font-weight:700;box-shadow:0 2px 12px rgba(26,115,232,.35)}
.fbar-sep{width:1px;height:1.1rem;background:var(--border);margin:0 .2rem}
.fbar-count{margin-left:auto;font-size:.72rem;color:var(--muted);font-weight:500}
.fbar-count b{color:var(--dark)}

/* ── CONTENT ─────────────────────────────── */
.content{padding:1.5rem;flex:1}

/* ── KPI GRID ────────────────────────────── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.85rem;margin-bottom:1.5rem;padding-top:1.35rem}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:.8rem;box-shadow:var(--shadow);padding:.7rem .95rem .8rem;display:flex;align-items:flex-start;justify-content:space-between;position:relative;transition:border-color .2s}
.kpi-card:hover{border-color:rgba(88,166,255,.25)}
.kpi-ico{width:2.8rem;height:2.8rem;border-radius:.55rem;display:flex;align-items:center;justify-content:center;margin-top:-1.35rem;flex-shrink:0;box-shadow:0 4px 14px rgba(0,0,0,.3),0 5px 8px -4px rgba(0,0,0,.4)}
.kpi-ico svg{width:1.15rem;height:1.15rem;stroke:white;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.kpi-body{flex:1;padding-left:.8rem;min-width:0}
.kpi-lbl{font-size:.62rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.2rem}
.kpi-val{font-size:1.35rem;font-weight:700;color:var(--dark);line-height:1.1}
.kpi-sub{font-size:.68rem;color:var(--muted);margin-top:.25rem}
.kpi-sub .up{color:#10b981}.kpi-sub .dn{color:#f85149}.kpi-sub .wa{color:#e3b341}
.g-dark{background:linear-gradient(135deg,#30363d,#21262d)}
.g-blue{background:linear-gradient(135deg,#388bfd,#1A73E8)}
.g-green{background:linear-gradient(135deg,#3fb950,#238636)}
.g-orange{background:linear-gradient(135deg,#f0883e,#db6d28)}
.g-red{background:linear-gradient(135deg,#f85149,#da3633)}
.g-purple{background:linear-gradient(135deg,#bc8cff,#8957e5)}

/* ── CHARTS ──────────────────────────────── */
.charts-row{display:grid;gap:1.25rem;margin-bottom:1.25rem}
.cr2{grid-template-columns:3fr 2fr}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);padding:1.25rem 1.5rem;overflow:hidden;transition:border-color .2s}
.chart-card:hover{border-color:rgba(88,166,255,.2)}
.cc-hdr{margin-bottom:1rem}
.cc-title{font-size:.85rem;font-weight:700;color:var(--dark)}
.cc-sub{font-size:.72rem;color:var(--muted);margin-top:.15rem}
.cw{position:relative;height:220px}.cw canvas{max-height:220px}
.cw-sm{position:relative;height:180px}.cw-sm canvas{max-height:180px}
.donut-legend{display:flex;flex-direction:column;gap:.5rem;margin-top:.75rem}
.dl-item{display:flex;align-items:center;justify-content:space-between;font-size:.78rem}
.dl-dot{width:.65rem;height:.65rem;border-radius:50%;flex-shrink:0;margin-right:.5rem}
.dl-lbl{display:flex;align-items:center;color:var(--muted)}
.dl-val{font-weight:700;color:var(--dark)}

/* ── TABLE ───────────────────────────────── */
.tbl-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;margin-bottom:1.5rem}
.tbl-hdr{padding:1.1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem}
.tbl-title{font-size:.88rem;font-weight:700;color:var(--dark)}
.tbl-title span{font-size:.74rem;font-weight:400;color:var(--muted);margin-left:.5rem}
.filters{display:flex;gap:.45rem;flex-wrap:wrap;align-items:center}
.finput{border:1px solid var(--border);border-radius:.5rem;padding:.38rem .75rem;font-size:.78rem;font-family:var(--font);color:var(--dark);background:var(--surface2);outline:none;min-width:160px}
.finput::placeholder{color:var(--muted)}
.finput:focus{border-color:rgba(88,166,255,.5);box-shadow:0 0 0 3px rgba(26,115,232,.1)}
.fsel{border:1px solid var(--border);border-radius:.5rem;padding:.38rem .75rem;font-size:.78rem;font-family:var(--font);color:var(--dark);outline:none;background:var(--surface2);cursor:pointer}
.fsel:focus{border-color:rgba(88,166,255,.5)}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.78rem}
thead{background:var(--surface2)}
th{padding:.7rem 1rem;text-align:left;font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);white-space:nowrap;border-bottom:1px solid var(--border)}
td{padding:.65rem 1rem;border-bottom:1px solid var(--border);color:var(--dark);white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.03)}
.tbl-foot{padding:.7rem 1.5rem;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:.74rem;color:var(--muted)}
.pager{display:flex;gap:.3rem;align-items:center}
.pbtn{width:1.9rem;height:1.9rem;border-radius:.4rem;border:1px solid var(--border);background:transparent;font-size:.74rem;font-family:var(--font);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s}
.pbtn:hover{background:rgba(88,166,255,.1);border-color:rgba(88,166,255,.4);color:var(--dark)}
.pbtn.on{background:var(--accent);color:white;border-color:var(--accent)}
.pbtn:disabled{opacity:.3;cursor:default}

/* ── BADGES ──────────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:.18rem .55rem;border-radius:.35rem;font-size:.7rem;font-weight:700;white-space:nowrap}
.bg-green{background:rgba(46,160,67,.15);color:#3fb950;border:1px solid rgba(46,160,67,.25)}
.bg-yellow{background:rgba(227,179,65,.12);color:#e3b341;border:1px solid rgba(227,179,65,.2)}
.bg-red{background:rgba(248,81,73,.12);color:#f85149;border:1px solid rgba(248,81,73,.2)}
.bg-blue{background:rgba(56,139,253,.12);color:#58a6ff;border:1px solid rgba(56,139,253,.2)}
.bg-gray{background:rgba(139,148,158,.1);color:#8b949e;border:1px solid rgba(139,148,158,.2)}
.bg-warn{background:rgba(248,81,73,.12);color:#f85149;border:1px solid rgba(248,81,73,.2)}
.bdot{width:.45rem;height:.45rem;border-radius:50%;margin-right:.35rem;display:inline-block}

/* ── LOADING / ERROR / TOAST ─────────────── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:1rem;color:var(--muted);position:fixed;inset:0;background:var(--bg);z-index:999}
.spinner{width:2.5rem;height:2.5rem;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.err-box{background:var(--surface);border:1px solid var(--border);border-radius:.75rem;padding:1.5rem;text-align:center;max-width:440px;color:var(--dark)}
.err-box b{display:block;margin-bottom:.5rem;font-size:.95rem;color:#f85149}
.err-box code{display:block;font-size:.75rem;margin:.5rem 0;word-break:break-all;background:var(--surface2);padding:.5rem;border-radius:.4rem;color:var(--muted)}
.err-box button{margin-top:1rem;background:var(--accent);color:white;border:none;padding:.5rem 1.25rem;border-radius:.5rem;cursor:pointer;font-size:.82rem;font-family:var(--font)}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--surface2);color:var(--dark);padding:.65rem 1.25rem;border-radius:.6rem;font-size:.8rem;font-weight:600;display:flex;align-items:center;gap:.5rem;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:9999;animation:slideUp .3s ease;cursor:pointer;border:1px solid var(--border)}
.toast-dot{width:.5rem;height:.5rem;border-radius:50%;background:#10b981;flex-shrink:0}
@keyframes slideUp{from{transform:translateY(.75rem);opacity:0}to{transform:translateY(0);opacity:1}}

/* ── RESPONSIVE ──────────────────────────── */
@media(max-width:1300px){.kpi-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.cr2{grid-template-columns:1fr}}
@media(max-width:768px){.sidebar{display:none}.main{margin-left:0}.kpi-grid{grid-template-columns:1fr}}

/* ── NOTICE ──────────────────────────────── */
.notice{background:rgba(227,179,65,.08);border:1px solid rgba(227,179,65,.2);border-radius:.75rem;padding:1rem 1.25rem;margin-bottom:1.5rem;font-size:.82rem;color:#e3b341;display:flex;align-items:flex-start;gap:.75rem}
.notice svg{width:1.1rem;height:1.1rem;flex-shrink:0;margin-top:.1rem;stroke:#e3b341;fill:none;stroke-width:2;stroke-linecap:round}
</style>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ─── CONFIG ─────────────────────────────── */
const SUPABASE_URL = 'https://shuiloynbgpazmipxckz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNodWlsb3luYmdwYXptaXB4Y2t6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3OTMwOTYsImV4cCI6MjA5NjM2OTA5Nn0.EUpS76OoUWAdnbuPOwW1v1I8CPINvlorqzpuaX_4AlY';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const FIELDS = [
  'no','poNo','invoiceNo','containerNo','blNo','cusDecNo','destinationPort','plant',
  'docRecDate','eta','ata','cusDecDate','declarationStatus','customsLine',
  'taxPayDate','completedCusInspection','customsClearanceDate',
  'truckPlate','driverTelephone','pickupAtPort','deliverToPlant','customerComplaint'
];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MO_MAP = Object.fromEntries(MONTHS.map((m,i)=>[m,i]));

/* ─── TIME FILTER ────────────────────────── */
const PERIOD_LABELS = {
  all:'All', q1:'Q1', q2:'Q2', q3:'Q3', q4:'Q4', h1:'H1 2026', h2:'H2 2026'
};
function filterByPeriod(ships, period) {
  if (period === 'all') return ships;
  return ships.filter(s => {
    const d = parseDate(s.eta);
    if (!d) return false;
    const mo = d.getMonth();
    if (period === 'q1') return mo <= 2;
    if (period === 'q2') return mo >= 3 && mo <= 5;
    if (period === 'q3') return mo >= 6 && mo <= 8;
    if (period === 'q4') return mo >= 9;
    if (period === 'h1') return mo <= 5;
    if (period === 'h2') return mo >= 6;
    return true;
  });
}

/* ─── SUPABASE DATA LAYER ────────────────── */
async function loadFromSupabase() {
  const { data, error } = await sb
    .from('shipments')
    .select('*')
    .order('no', { ascending: true });
  if (error) throw error;
  return (data || []).map(mapSupabaseRow);
}

function mapSupabaseRow(r) {
  return {
    no: r.no||'', poNo: r.po_no||'', invoiceNo: r.invoice_no||'',
    containerNo: r.container_no||'', blNo: r.bl_no||'',
    cusDecNo: r.cus_dec_no||'', destinationPort: r.destination_port||'', plant: r.plant||'',
    docRecDate: r.doc_rec_date||'', eta: r.eta||'', ata: r.ata||'',
    cusDecDate: r.cus_dec_date||'', declarationStatus: r.declaration_status||'',
    customsLine: r.customs_line||'', taxPayDate: r.tax_pay_date||'',
    completedCusInspection: r.completed_cus_inspection||'',
    customsClearanceDate: r.customs_clearance_date||'',
    truckPlate: r.truck_plate||'', driverTelephone: r.driver_telephone||'',
    pickupAtPort: r.pickup_at_port||'', deliverToPlant: r.deliver_to_plant||'',
    customerComplaint: r.customer_complaint||'',
  };
}

/* ─── DATA UTILITIES ─────────────────────── */
function mapRow(r) { return Object.fromEntries(FIELDS.map((f,i)=>[f, r[i]||''])); }

function parseDate(str) {
  if (!str || !str.trim()) return null;
  const m = str.trim().match(/^(\d{1,2}):(\d{2})\s*-\s*(\d{1,2})\s+(\w{3})$/);
  if (!m) return null;
  const mo = MO_MAP[m[4]]; if (mo===undefined) return null;
  return new Date(2026, mo, +m[3], +m[1], +m[2]);
}
function dateOnly(d) { return d ? new Date(d.getFullYear(),d.getMonth(),d.getDate()) : null; }
function daysBetween(a,b) { return (!a||!b) ? null : Math.round((b-a)/86400000); }
function fmtPct(v) { return v==null ? '—' : v.toFixed(1)+'%'; }

/* ─── KPI CALC ───────────────────────────── */
function calcKPIs(ships) {
  // Total containers = count of non-empty containerNo
  const totalContainers = ships.filter(s=>s.containerNo).length;
  // Containers at port = containerNo rows where pickupAtPort = No
  const atPort          = ships.filter(s=>s.containerNo&&s.pickupAtPort==='No').length;
  // In transit (for sub-label)
  const inTransit       = ships.filter(s=>s.containerNo&&s.pickupAtPort==='Yes'&&s.deliverToPlant==='No').length;
  // Delivered = pickupAtPort=Yes AND deliverToPlant=Yes
  const delivered       = ships.filter(s=>s.containerNo&&s.pickupAtPort==='Yes'&&s.deliverToPlant==='Yes').length;
  // Declarations = count of non-empty cusDecNo
  const declarations    = ships.filter(s=>s.cusDecNo).length;
  // Correct / Incorrect among those with a cusDecNo
  const correct         = ships.filter(s=>s.cusDecNo&&s.declarationStatus==='Correct').length;
  const incorrect       = ships.filter(s=>s.cusDecNo&&s.declarationStatus==='Incorrect').length;
  const decAcc          = declarations>0 ? (correct/declarations*100) : 0;
  // Complaints = customerComplaint exists and is not "No Complaint"
  const complaints      = ships.filter(s=>s.customerComplaint&&s.customerComplaint!=='No Complaint').length;
  // On-time = ATA <= ETA (date only)
  const withDates       = ships.filter(s=>s.eta&&s.ata);
  const onTime          = withDates.filter(s=>{
    const e=dateOnly(parseDate(s.eta)),a=dateOnly(parseDate(s.ata));
    return e&&a&&a<=e;
  }).length;
  const onTimeRate = withDates.length>0 ? (onTime/withDates.length*100) : 0;
  // Customs lines (for charts)
  const green   = ships.filter(s=>s.customsLine==='Green').length;
  const yellow  = ships.filter(s=>s.customsLine==='Yellow').length;
  const red     = ships.filter(s=>s.customsLine==='Red').length;
  const cleared = ships.filter(s=>s.customsClearanceDate).length;
  return { totalContainers,atPort,inTransit,delivered,declarations,correct,incorrect,
           decAcc,complaints,onTimeRate,onTime,withDates:withDates.length,
           green,yellow,red,cleared };
}

/* ─── CHART DATA ─────────────────────────── */
function monthlyAccuracy(ships) {
  const m={};
  ships.filter(s=>s.cusDecDate&&s.declarationStatus).forEach(s=>{
    const d=parseDate(s.cusDecDate); if(!d)return;
    const k=MONTHS[d.getMonth()];
    if(!m[k])m[k]={c:0,t:0}; m[k].t++;
    if(s.declarationStatus==='Correct')m[k].c++;
  });
  return MONTHS.map(mo=>({label:mo,rate:m[mo]?+(m[mo].c/m[mo].t*100).toFixed(1):null,n:m[mo]?.t||0}));
}
function monthlyOnTime(ships) {
  const m={};
  ships.filter(s=>s.eta&&s.ata).forEach(s=>{
    const d=parseDate(s.eta); if(!d)return;
    const k=MONTHS[d.getMonth()];
    if(!m[k])m[k]={ok:0,t:0}; m[k].t++;
    const e=dateOnly(d),a=dateOnly(parseDate(s.ata));
    if(a&&a<=e)m[k].ok++;
  });
  return MONTHS.map(mo=>({label:mo,rate:m[mo]?+(m[mo].ok/m[mo].t*100).toFixed(1):null,n:m[mo]?.t||0}));
}
function monthlyVolume(ships) {
  const m={};
  ships.filter(s=>s.eta).forEach(s=>{
    const d=parseDate(s.eta); if(!d)return;
    const k=MONTHS[d.getMonth()]; m[k]=(m[k]||0)+1;
  });
  return MONTHS.map(mo=>({label:mo,count:m[mo]||0}));
}
function byGroup(ships,key) {
  const m={};
  ships.forEach(s=>{ if(s[key])m[s[key]]=(m[s[key]]||0)+1; });
  return Object.entries(m).sort((a,b)=>b[1]-a[1]);
}

function ChartEl({config,height=220}) {
  const cvs=useRef(null), ch=useRef(null), key=useRef(null);
  const nk=JSON.stringify(config);
  useEffect(()=>{
    if(!cvs.current||!config)return;
    if(ch.current){ch.current.destroy();ch.current=null;}
    ch.current=new Chart(cvs.current.getContext('2d'),config);
    key.current=nk;
  },[nk]);
  useEffect(()=>()=>{if(ch.current)ch.current.destroy();},[]);
  return <canvas ref={cvs} style={{maxHeight:height+'px'}} />;
}

/* ─── TABLE ──────────────────────────────── */
const PAGE=20;
function Table({ships}) {
  const [q,setQ]=useState('');
  const [pf,setPf]=useState('');
  const [lf,setLf]=useState('');
  const [df,setDf]=useState('');
  const [pg,setPg]=useState(1);
  const ports=[...new Set(ships.map(s=>s.destinationPort))].filter(Boolean).sort();
  const rows=ships.filter(s=>{
    const ql=q.toLowerCase();
    if(ql&&![s.poNo,s.containerNo,s.blNo,s.invoiceNo,s.plant].some(v=>v.toLowerCase().includes(ql)))return false;
    if(pf&&s.destinationPort!==pf)return false;
    if(lf&&s.customsLine!==lf)return false;
    if(df&&s.declarationStatus!==df)return false;
    return true;
  });
  const tp=Math.max(1,Math.ceil(rows.length/PAGE));
  const p=Math.min(pg,tp);
  const slice=rows.slice((p-1)*PAGE,p*PAGE);
  useEffect(()=>setPg(1),[q,pf,lf,df]);
  const go=n=>setPg(Math.max(1,Math.min(tp,n)));
  return (
    <div className="tbl-card">
      <div className="tbl-hdr">
        <div className="tbl-title">Shipment List <span>({rows.length} / {ships.length})</span></div>
        <div className="filters">
          <input className="finput" placeholder="🔍 PO / Container / BL…" value={q} onChange={e=>setQ(e.target.value)}/>
          <select className="fsel" value={pf} onChange={e=>setPf(e.target.value)}>
            <option value="">All ports</option>{ports.map(p=><option key={p}>{p}</option>)}
          </select>
          <select className="fsel" value={lf} onChange={e=>setLf(e.target.value)}>
            <option value="">All channels</option>
            <option>Green</option><option>Yellow</option><option>Red</option>
          </select>
          <select className="fsel" value={df} onChange={e=>setDf(e.target.value)}>
            <option value="">All declarations</option>
            <option>Correct</option><option>Incorrect</option>
          </select>
        </div>
      </div>
      <div className="tbl-scroll">
        <table>
          <thead><tr>
            <th>#</th><th>PO No</th><th>Container No</th><th>BL No</th><th>Cus Dec No</th>
            <th>Port</th><th>Plant</th><th>ETA</th><th>ATA</th>
            <th>Declaration</th><th>Channel</th><th>Clearance Date</th>
            <th>Picked Up</th><th>Delivered</th><th>Complaint</th>
          </tr></thead>
          <tbody>
            {slice.length===0
              ? <tr><td colSpan={15} style={{textAlign:'center',color:'var(--muted)',padding:'2rem'}}>No matching records</td></tr>
              : slice.map(s=>{
                const late=(()=>{const e=parseDate(s.eta),a=parseDate(s.ata);return e&&a&&dateOnly(a)>dateOnly(e);})();
                return(
                  <tr key={s.no}>
                    <td style={{color:'var(--muted)'}}>{s.no}</td>
                    <td style={{fontWeight:600,color:'#58a6ff'}}>{s.poNo}</td>
                    <td style={{fontFamily:'monospace',fontSize:'.76rem'}}>{s.containerNo}</td>
                    <td style={{fontFamily:'monospace',fontSize:'.76rem'}}>{s.blNo}</td>
                    <td style={{fontFamily:'monospace',fontSize:'.76rem',color:'var(--muted)'}}>{s.cusDecNo}</td>
                    <td>{s.destinationPort.replace(' Port','')}</td>
                    <td>{s.plant.replace(' Plant','')}</td>
                    <td>{s.eta}</td>
                    <td style={{color:late?'#f85149':'inherit',fontWeight:late?600:400}}>{s.ata}{late&&' ⚠'}</td>
                    <td><Badge val={s.declarationStatus}/></td>
                    <td><Badge val={s.customsLine}/></td>
                    <td style={{fontSize:'.72rem',color:'var(--muted)'}}>{s.customsClearanceDate}</td>
                    <td><Badge val={s.pickupAtPort}/></td>
                    <td><Badge val={s.deliverToPlant}/></td>
                    <td>{s.customerComplaint&&s.customerComplaint!=='No Complaint'
                      ?<span className="badge bg-warn">{s.customerComplaint}</span>
                      :<span style={{color:'var(--muted)',fontSize:'.72rem'}}>—</span>}
                    </td>
                  </tr>
                );
              })}
          </tbody>
        </table>
      </div>
      <div className="tbl-foot">
        <span>Page {p} / {tp} · {rows.length} records</span>
        <div className="pager">
          <button className="pbtn" onClick={()=>go(1)} disabled={p===1}>«</button>
          <button className="pbtn" onClick={()=>go(p-1)} disabled={p===1}>‹</button>
          {Array.from({length:Math.min(5,tp)},(_,i)=>{
            const s=Math.max(1,Math.min(p-2,tp-4)), pn=s+i;
            return pn<=tp?<button key={pn} className={`pbtn${pn===p?' on':''}`} onClick={()=>go(pn)}>{pn}</button>:null;
          })}
          <button className="pbtn" onClick={()=>go(p+1)} disabled={p===tp}>›</button>
          <button className="pbtn" onClick={()=>go(tp)} disabled={p===tp}>»</button>
        </div>
      </div>
    </div>
  );
}

/* ─── SYNC BUTTON ────────────────────────── */
const SYNC_URL = '/api/sync';
function SyncButton({onDone}) {
  const [syncing,setSyncing] = useState(false);
  const [msg,    setMsg]     = useState(null);
  const doSync = async () => {
    setSyncing(true); setMsg(null);
    try {
      const r = await fetch(SYNC_URL);
      const j = await r.json();
      setMsg(r.ok ? `✅ ${j.rows} rows` : `❌ ${j.error}`);
      if(r.ok && onDone) onDone();
    } catch(e) { setMsg('❌ ' + e.message); }
    finally { setSyncing(false); setTimeout(()=>setMsg(null),3000); }
  };
  return (
    <div style={{display:'flex',alignItems:'center',gap:'.4rem'}}>
      <button onClick={doSync} disabled={syncing}
        style={{display:'flex',alignItems:'center',gap:'.4rem',
          background:syncing?'rgba(255,255,255,.06)':'rgba(63,185,80,.15)',
          color:syncing?'var(--muted)':'#3fb950',
          border:`1px solid ${syncing?'var(--border)':'rgba(63,185,80,.3)'}`,
          borderRadius:'.5rem',padding:'.4rem .85rem',fontSize:'.78rem',fontWeight:600,
          cursor:syncing?'default':'pointer',fontFamily:'var(--font)'}}>
        {syncing?'Syncing…':'⟳ Sync Sheet'}
      </button>
      {msg&&<span style={{fontSize:'.72rem',fontWeight:600,color:msg.startsWith('✅')?'#3fb950':'#f85149'}}>{msg}</span>}
    </div>
  );
}

              gradient={kpi.decAcc>=90?'g-green':'g-purple'} icon={ICheck}/>
            <KpiCard label="Delivered Containers" value={kpi.delivered}
              sub={`<span class="up">${kpi.totalContainers?(kpi.delivered/kpi.totalContainers*100).toFixed(1):0}%</span> of total containers`} gradient="g-green" icon={ITruck}/>
          </div>

          {/* CHARTS ROW 1 */}
          <div className="charts-row cr2">
            <div className="chart-card">
              <div className="cc-hdr"><div className="cc-title">Declaration Accuracy by Month</div>
                <div className="cc-sub">By Cus Dec Date · Overall: {fmtPct(kpi.decAcc)}</div></div>
              <div className="cw"><LineAcc data={accMo}/></div>
            </div>
            <div className="chart-card">
              <div className="cc-hdr"><div className="cc-title">Customs Channel Distribution</div>
                <div className="cc-sub">Customs line breakdown</div></div>
              <DonutChannels g={kpi.green} y={kpi.yellow} r={kpi.red}/>
            </div>
          </div>

          {/* CHARTS ROW 2 */}
          <div className="charts-row cr2">
            <div className="chart-card">
              <div className="cc-hdr"><div className="cc-title">On-Time Delivery by Month</div>
                <div className="cc-sub">ATA ≤ ETA · Overall: {fmtPct(kpi.onTimeRate)}</div></div>
              <div className="cw"><LineOT data={otMo}/></div>
            </div>
            <div className="chart-card">
              <div className="cc-hdr"><div className="cc-title">Containers by Destination Port</div>
                <div className="cc-sub">Volume by destination</div></div>
              <div className="cw-sm"><BarH data={portD}/></div>
            </div>
          </div>

          {/* CHARTS ROW 3 */}
          <div className="charts-row cr2">
            <div className="chart-card">
              <div className="cc-hdr"><div className="cc-title">Container Volume by Month</div>
                <div className="cc-sub">Based on ETA</div></div>
              <div className="cw"><BarVol data={volMo}/></div>
            </div>
            <div className="chart-card">
              <div className="cc-hdr"><div className="cc-title">Containers by Plant</div>
                <div className="cc-sub">Delivery point breakdown</div></div>
              <div className="cw-sm"><BarH data={plantD}/></div>
            </div>
          </div>

          {/* TABLE */}
          <Table ships={filteredShips}/>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
